<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IUMTWEB Dashboard</title>
  <!-- Bootstrap CSS -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <!--<link rel="stylesheet" href="style.css">-->
  <link rel="stylesheet" href="chat.css">

</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <a class="navbar-brand" href="#">SPA Dashboard</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item active">
                <a class="nav-link" href="#" onclick="loadPlayerValuations()">Player Valuations</a>
            </li>
            <!-- Other menu items for navigating other parts of the API? -->
        </ul>
    </div>
</nav>

  <div class="row">
        <!-- Filters -->
        <div class="col-md-3">
            <!-- Filters forms -->
            <form id="searchByClubForm">
            <div class="form-group">
                <label for="clubId">Search by Club ID:</label>
                <input type="text" class="form-control" id="clubId" placeholder="Enter Club ID">
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
        <div class="col-md-6">
            <form id="searchByPlayerForm">
              <div class="form-group">
                <label for="playerName">Search by Player Name:</label>
                <input type="text" class="form-control" id="playerName" placeholder="Enter Player Name" list="playerNameList">
                <datalist id="playerNameList"></datalist>
            </div>
            <div class="form-group">
                <label for="date">Search by Date:</label>
                <input type="date" class="form-control" id="date">
            </div>
            <button type="submit" class="btn btn-primary">Search</button>
            </form>
        </div>
    </div>

    <div class="col-mt-5">
        <!-- Player Valuations Table -->
        <table id="playerValuationsTable" class="table">
        <thead>
            <tr>
            <th>Player ID</th>
            <th>Date</th>
            <th>Last Season</th>
            <th>Market Value (EUR)</th>
            <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Player Valuations will be inserted here -->
        </tbody>
        </table>
    </div>

  <!-- Edit Player Valuation Modal -->
<div class="modal fade" id="editPlayerValuationModal" tabindex="-1" role="dialog" aria-labelledby="editPlayerValuationModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editPlayerValuationModalLabel">Edit Player Valuation</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <form id="editPlayerValuationForm">
            <div class="form-group">
              <label for="editLastSeason">Last Season:</label>
              <input type="text" class="form-control" id="editLastSeason" placeholder="Enter Last Season">
            </div>
            <div class="form-group">
              <label for="editDatetime">Datetime:</label>
              <input type="datetime-local" class="form-control" id="editDatetime" placeholder="Enter Datetime">
            </div>
            <div class="form-group">
                <label for="editDateWeek">Dateweek:</label>
                <input type="text" class="form-control" id="editDateWeek" placeholder="Enter DateWeek">
              </div>
            <div class="form-group">
              <label for="editMarketValue">Market Value (EUR):</label>
              <input type="text" class="form-control" id="editMarketValue" placeholder="Enter Market Value">
            </div>
            <div class="form-group">
              <label for="editN">N:</label>
              <input type="number" class="form-control" id="editN" placeholder="Enter N">
            </div>
            <div class="form-group">
              <label for="editCurrentClubId">Current Club ID:</label>
              <input type="text" class="form-control" id="editCurrentClubId" placeholder="Enter Current Club ID">
            </div>
            <div class="form-group">
              <label for="editPlayerClubDomesticCompetitionId">Player Club Domestic Competition ID:</label>
              <input type="text" class="form-control" id="editPlayerClubDomesticCompetitionId" placeholder="Enter Player Club Domestic Competition ID">
            </div>
            <div class="form-group">
                <input type="text" class="form-control" id="editPlayerId" placeholder="Enter Player ID" hidden="true">
            </div>
            <div class="form-group">
                <input type="text" class="form-control" id="editDate" placeholder="Enter Date" hidden="true">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  
  

  <!-- Delete Player Valuation Modal -->
  <div class="modal fade" id="deletePlayerValuationModal" tabindex="-1" role="dialog" aria-labelledby="deletePlayerValuationModalLabel" aria-hidden="true">
  </div>

  <!-- Chat Component -->
  <div id="chatComponent" class="chat-component">
    <div class="chat-header">
      <h3>Chat</h3>
      <button id="closeChatBtn" class="btn">✖️</button>
    </div>
    <div class="chat-body">
      <div id="messageArea" class="message-area"></div>
      <input type="text" id="messageInput" placeholder="Type your message">
      <button id="sendMessageBtn" class="btn btn-primary">⬆️</button>
    </div>
  </div>
  <!-- Chat Icon Button -->
  <button id="openChatBtn" class="chat-icon-btn">💬</button>


  <!-- Bootstrap JS and Axios -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <!-- Custom JavaScript -->
  <script src="app.js"></script>

  <audio id="notificationSound">
    <source src="./assets/audio/pop-alert.mp3" type="audio/mpeg">
    Your browser does not support the audio element!
  </audio>

  <!-- socket.io -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</body>
</html>
